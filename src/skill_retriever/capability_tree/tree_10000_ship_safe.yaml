      - id: gamma-phase-associator
        name: gamma-phase-associator
        description: An overview of the python package for running the GaMMA earthquake phase association algorithm. The algorithm
          expects phase picks data and station data as input and produces (through unsupervised clustering) earthquake events
          with source information like earthquake location, origin time and magnitude. The skill explains commonly used functions
          and the expected input/output format.
        skills: []
      - id: obspy-data-api
        name: obspy-data-api
        description: An overview of the core data API of ObsPy, a Python framework for processing seismological data. It is
          useful for parsing common seismological file formats, or manipulating custom data into standard objects for downstream
          use cases such as ObsPy's signal processing routines or SeisBench's modeling API.
        skills: []
      - id: obspy-datacenter-client
        name: obspy-datacenter-client
        description: ObsPy allows you to easily download earthquake data from various data centers/networks through its client
          API. This is an overview of available services and a demo of the client API for International Federation of Digital
          Seismograph Networks (FDSN). Use this if you need to download earthquake research data.
        skills: []
      - id: seisbench-model-api
        name: seisbench-model-api
        description: An overview of the core model API of SeisBench, a Python framework for training and applying machine
          learning algorithms to seismic data. It is useful for annotating waveforms using pretrained SOTA ML models, for
          tasks like phase picking, earthquake detection, waveform denoising and depth estimation. For any waveform, you can
          manipulate it into an obspy stream object and it will work seamlessly with seisbench models.
        skills: []
